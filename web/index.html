<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prtkl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1.1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      text-align: center;
    }

    input[type="text"]:focus {
      border-color: #111;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .result {
      width: 100%;
      max-width: 512px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .result .placeholder {
      color: #ccc;
      font-size: 0.9rem;
    }

    .status {
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>prtkl</h1>
    <div class="input-row">
      <input type="text" id="word" placeholder="type a word" autofocus>
      <button id="generate" onclick="generate()">go</button>
    </div>
    <p class="status" id="status"></p>
    <div class="result" id="result">
      <span class="placeholder">your art will appear here</span>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';

    const wordInput = document.getElementById('word');
    const btn = document.getElementById('generate');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    wordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate();
    });

    async function generate() {
      const word = wordInput.value.trim();
      if (!word) return;

      btn.disabled = true;
      status.textContent = '';
      result.innerHTML = '<span class="placeholder">generating...</span>';

      try {
        // Step 1: Translate word to prompt via local server
        const translateRes = await fetch(`${API_BASE}/translate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ word }),
        });

        if (!translateRes.ok) throw new Error('Translation failed');
        const { prompt } = await translateRes.json();
        status.textContent = '';

        // Step 2: Generate image via local server (which calls Modal)
        const imageRes = await fetch(`${API_BASE}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });

        if (!imageRes.ok) throw new Error('Generation failed');
        const blob = await imageRes.blob();
        const url = URL.createObjectURL(blob);

        result.innerHTML = `<img src="${url}" alt="${word}">`;
        status.textContent = `"${word}"`;
      } catch (err) {
        status.textContent = `error: ${err.message}`;
        result.innerHTML = '<span class="placeholder">something went wrong</span>';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
