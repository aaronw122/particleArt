<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prtkl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7rem 2rem 2rem;
      gap: 0.75rem;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #999;
      font-weight: 300;
    }

    .input-row {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 500px;
      border: 1px solid #ddd;
      border-radius: 15px;
      margin-top: 1.5rem;
      padding: 0.5rem 0.5rem 0.5rem 1.25rem;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: #999;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.4rem 0;
      font-size: 1.05rem;
      border: none;
      outline: none;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    button svg {
      width: 18px;
      height: 18px;
    }

    .result {
      display: flex;
      justify-content: center;
      padding: 0 2rem 2rem;
    }

    .result img {
      max-width: 512px;
      width: 100%;
      object-fit: contain;
    }

    .result .placeholder {
      color: #ccc;
      font-size: 0.9rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>prtkl</h1>
    <p class="subtitle">type a word, see it come to life</p>
    <p class="subtitle" style="font-size: 0.7rem; margin-top: 0.5rem;">pose accuracy is limited while running a smaller model — upgrading soon</p>
    <div class="input-row">
      <input type="text" id="word" placeholder="type a word" autofocus>
      <button id="generate" onclick="generate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
    </div>
  </div>
  <div class="result" id="result"></div>

  <script>
    const API_BASE = '';

    const wordInput = document.getElementById('word');
    const btn = document.getElementById('generate');
    const result = document.getElementById('result');

    wordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate();
    });

    async function generate() {
      const word = wordInput.value.trim();
      if (!word) return;

      btn.disabled = true;

      // Keep existing image visible while generating, or show placeholder if first time
      if (!result.querySelector('img')) {
        result.innerHTML = '<span class="placeholder">generating...</span>';
      }

      try {
        const translateRes = await fetch(`${API_BASE}/translate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ word }),
        });

        const translateData = await translateRes.json();
        if (!translateRes.ok) throw new Error(translateData.error || 'Translation failed');
        const { prompt } = translateData;

        const imageRes = await fetch(`${API_BASE}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });

        if (!imageRes.ok) throw new Error('Generation failed');
        const blob = await imageRes.blob();
        const url = URL.createObjectURL(blob);

        result.innerHTML = `<img src="${url}" alt="${word}">`;
      } catch (err) {
        result.innerHTML = '<span class="placeholder">something went wrong</span>';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
